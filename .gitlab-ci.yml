stages:
  - prepare
  - build
  - publish

variables:
  CI_CHUNK_SIZE: "65"
  IS_PR_CHECK: "false"
  # Runner tag(s) for the build-chunk jobs in the child pipeline.
  # Comma-separate for multiple tags, e.g. "linux,heavy".
  BUILD_RUNNER_TAGS: "android"
  # Max concurrent build-chunk jobs. Leave empty (or unset) for unlimited;
  # set to e.g. "5" to cap concurrency via resource_group slots.
  BUILD_CONCURRENCY: "6"
  # Max heap for each build-chunk JVM (Gradle + Kotlin compiler share it
  # when in-process strategy is used). Approx total RAM per chunk ≈ this
  # value + ~1g of non-heap overhead. With BUILD_CONCURRENCY=5 and
  # BUILD_MAX_MEMORY=4g, peak RAM across all chunks is ~25g.
  BUILD_MAX_MEMORY: "3g"
  # Full history is needed for `git diff` against the previous commit.
  GIT_DEPTH: "0"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  auto_cancel:
    on_new_commit: interruptible

default:
  interruptible: true

# ---------------------------------------------------------------------------
# Prepare: work out which modules changed and emit the child-pipeline YAML.
# ---------------------------------------------------------------------------
prepare:
  stage: prepare
  tags:
    - android
  image: python:3.12-slim
  timeout: 10 minutes
  before_script:
    - apt-get update -qq && apt-get install -yqq --no-install-recommends git
  script:
    # GitLab doesn't track "last successful commit" the way nrwl/nx-set-shas
    # does on GitHub, so we diff against the previous commit. Fall back to the
    # empty-tree SHA (and rebuild everything) if CI_COMMIT_BEFORE_SHA is empty,
    # all zeros (new branch / force-push), or points at a commit the local
    # clone doesn't have (rebased / squashed / dropped ref).
    - |
      BASE_SHA="${CI_COMMIT_BEFORE_SHA}"
      EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
      if [ -z "$BASE_SHA" ] \
         || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
         || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
        echo "Base SHA '$BASE_SHA' unusable; falling back to empty tree (full rebuild)."
        BASE_SHA="$EMPTY_TREE"
      fi
      python ./.gitlab/scripts/generate-build-matrices.py "$BASE_SHA" Release
  artifacts:
    paths:
      - build-pipeline.yml
      - modules-delete.json
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Build: child pipeline generated by the prepare step above. Each chunk runs
# as its own job in parallel, producing APK artifacts.
# ---------------------------------------------------------------------------
build:
  stage: build
  needs: [prepare]
  trigger:
    include:
      - artifact: build-pipeline.yml
        job: prepare
    strategy: depend

# ---------------------------------------------------------------------------
# Publish: gather the APKs, run the inspector, merge with the existing repo
# branch in the output project, and push.
# ---------------------------------------------------------------------------
publish:
  stage: publish
  tags:
    - android
  image: eclipse-temurin:17-jdk
  timeout: 15 minutes
  needs:
    - job: prepare
      artifacts: true
    - job: build
  # Only run on the upstream project, never on forks. Set UPSTREAM_PROJECT_PATH
  # in CI/CD settings (e.g. "myorg/extensions-source").
  rules:
    - if: $CI_PROJECT_PATH == $UPSTREAM_PROJECT_PATH
  variables:
    ANDROID_HOME: /opt/android-sdk
  before_script:
    - apt-get update -qq
    - apt-get install -yqq --no-install-recommends python3 jq curl git unzip ca-certificates
    # Minimal Android SDK install — we only need `aapt` from build-tools for create-repo.py.
    - mkdir -p "$ANDROID_HOME/cmdline-tools"
    - curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline.zip
    - unzip -q /tmp/cmdline.zip -d "$ANDROID_HOME/cmdline-tools"
    - mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
    - yes | sdkmanager --licenses > /dev/null
    - sdkmanager "build-tools;34.0.0" > /dev/null
  script:
    # Child-pipeline APKs end up under the job directories after `needs:` pulls
    # them in; consolidate them into the path move-built-apks.py expects.
    - mkdir -p ~/apk-artifacts
    - find . -name "*.apk" -not -path "./repo/*" -exec mv {} ~/apk-artifacts/ \;

    - python3 ./.gitlab/scripts/move-built-apks.py

    # Fetch the inspector jar (still hosted on GitHub — unrelated to our repo).
    - INSPECTOR_LINK=$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')
    - curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
    - java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
    - python3 ./.gitlab/scripts/create-repo.py

    # Clone the output repo's `repo` branch, merge in the new artifacts, push.
    # TARGET_REPO_PATH is e.g. "myorg/extensions"; BOT_TOKEN is a project/group
    # access token with `write_repository` scope on that project.
    - cd ..
    - git clone --branch repo --single-branch "https://oauth2:${BOT_TOKEN}@${CI_SERVER_HOST}/${TARGET_REPO_PATH}.git" repo-output
    - cd repo-output
    - python3 "${CI_PROJECT_DIR}/.gitlab/scripts/merge-repo.py" "$(cat ${CI_PROJECT_DIR}/modules-delete.json)"
    - git config user.email "ci-bot@users.noreply.${CI_SERVER_HOST}"
    - git config user.name  "CI Bot"
    - |
      if [ -n "$(git status --porcelain)" ]; then
        git add .
        git commit -m "Update extensions repo"
        git push
        # jsDelivr also serves GitLab under /gl/ — drop this line if you don't use it.
        curl -sS "https://purge.jsdelivr.net/gl/${TARGET_REPO_PATH}@repo/index.min.json" || true
      else
        echo "No changes to commit"
      fi
